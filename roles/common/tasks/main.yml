---
- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true

- name: Ensure core docker directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ docker_root }}"
    - "{{ docker_compose_dir }}"
    - "{{ docker_data_dir }}"
    - "{{ docker_traefik_dir }}"
    - "{{ docker_traefik_dynamic_dir }}"
    - "{{ docker_traefik_certs_dir }}"
    - "{{ homepage_config_dir }}"
    - "{{ vaultwarden_data_dir }}"