---
- name: Ensure tailscale cert directory exists
  ansible.builtin.file:
    path: "{{ tailscale_cert_dir }}"
    state: directory
    mode: "0755"

- name: Check current Tailscale certificate
  ansible.builtin.stat:
    path: "{{ tailscale_cert_crt }}"
  register: tailscale_cert_stat

- name: Check current Tailscale key
  ansible.builtin.stat:
    path: "{{ tailscale_cert_key }}"
  register: tailscale_key_stat

- name: Warn if Tailscale cert files are missing
  ansible.builtin.debug:
    msg:
      - "Tailscale cert files are missing."
      - "Expected:"
      - "  {{ tailscale_cert_crt }}"
      - "  {{ tailscale_cert_key }}"
      - "Generate them manually first with:"
      - "  sudo tailscale cert {{ homelab_tailnet_fqdn }}"
  when: not tailscale_cert_stat.stat.exists or not tailscale_key_stat.stat.exists
