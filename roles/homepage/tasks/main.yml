---
- name: Ensure Homepage config directory exists
  ansible.builtin.file:
    path: "{{ homepage_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render Homepage services config
  ansible.builtin.template:
    src: services.yaml.j2
    dest: "{{ homepage_config_dir }}/services.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Ensure Homepage stack is present
  community.docker.docker_compose_v2:
    project_src: "{{ docker_project_root }}"
    files:
      - stacks/homepage.yml
    state: present
