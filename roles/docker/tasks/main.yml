---
- name: Ensure prerequisite packages are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ensure Docker apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Install Docker repository source file
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_facts['distribution_release'] }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started

- name: Check docker CLI availability
  ansible.builtin.command: docker --version
  register: docker_cli_check
  changed_when: false

- name: Check docker compose availability
  ansible.builtin.command: docker compose version
  register: docker_compose_check
  changed_when: false

- name: Ensure proxy network exists
  community.docker.docker_network:
    name: "{{ docker_proxy_network }}"
    state: present
