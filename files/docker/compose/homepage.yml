services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v0.10.9
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: homelab.tail9c7112.ts.net,home.homelab
    volumes:
      - /opt/docker/data/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`home.homelab`) || Host(`homelab.tail9c7112.ts.net`)
      - traefik.http.routers.homepage.entrypoints=websecure
      - traefik.http.routers.homepage.middlewares=default-security-headers@file
      - traefik.http.services.homepage.loadbalancer.server.port=3000

networks:
  proxy:
    external: true
